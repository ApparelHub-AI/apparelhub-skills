name: Forbidden patterns

# Fails any PR that reintroduces v1.x antipatterns:
#   1. Permission-bypass framing in scripts (the v1.x "exists to suppress
#      Claude Code's expansion check" rationale)
#   2. The user-overridable APPARELHUB_API_BASE knob in helpers or installer
#   3. The ah_curl wrapper (which forwarded keys to arbitrary URLs)
#
# Documentation that EXPLAINS these were removed (SECURITY.md,
# porting-guides/, acceptance/, README.md migration sections) is allowed —
# those mentions are deliberate and helpful. The grep scopes below
# restrict each check to where reintroduction would represent live
# functionality, not historical documentation.
#
# See SECURITY.md §3 for the trust model these checks enforce.

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  forbidden-patterns:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: ah_curl must stay deleted (file existence check)
        run: |
          set -euo pipefail
          for path in apparelhub/scripts/ah_curl scripts/ah_curl claude-code/ah_curl; do
            if [ -e "$path" ]; then
              echo "ERROR: $path exists. ah_curl was deleted in v2.0 because it" >&2
              echo "       forwarded the API key to arbitrary URLs. Use plain" >&2
              echo "       curl https://api.apparelhub.ai/agents/v1/... instead." >&2
              echo "       See SECURITY.md §2d." >&2
              exit 1
            fi
          done

      - name: No permission-bypass framing in shipped scripts
        run: |
          set -euo pipefail
          # Scope: scripts only. Documentation that EXPLAINS these were
          # removed is allowed.
          violations=$(grep -lEi 'simple_expansion|expansion-free|allowlist-clean' \
              apparelhub/scripts/ah_check \
              apparelhub/scripts/ah_poll_mockup \
              apparelhub/scripts/ah_poll_generation \
              apparelhub/scripts/ah_classify_previews \
              apparelhub/scripts/ah_pick_provider_url \
              apparelhub/scripts/ah_pick_dimensions \
              apparelhub/scripts/make_transparent.py \
              claude-code/install_path.sh \
              install.sh \
              2>/dev/null || true)
          if [ -n "$violations" ]; then
            echo "ERROR: forbidden v1.x framing in script files:" >&2
            echo "$violations" >&2
            echo "       See SECURITY.md §2a." >&2
            exit 1
          fi

      - name: No APPARELHUB_API_BASE reads in helpers or installer
        run: |
          set -euo pipefail
          violations=$(grep -lE 'APPARELHUB_API_BASE' \
              apparelhub/scripts/ah_check \
              apparelhub/scripts/ah_poll_mockup \
              apparelhub/scripts/ah_poll_generation \
              apparelhub/scripts/ah_classify_previews \
              apparelhub/scripts/ah_pick_provider_url \
              apparelhub/scripts/ah_pick_dimensions \
              apparelhub/scripts/make_transparent.py \
              claude-code/install_path.sh \
              install.sh \
              2>/dev/null || true)
          if [ -n "$violations" ]; then
            echo "ERROR: APPARELHUB_API_BASE reintroduced in scripts or installer:" >&2
            echo "$violations" >&2
            echo "       The canonical host is hard-pinned. See SECURITY.md §2c." >&2
            exit 1
          fi

      - name: Helper scripts that make network calls must pin canonical host
        run: |
          set -euo pipefail
          for script in apparelhub/scripts/ah_check apparelhub/scripts/ah_poll_mockup apparelhub/scripts/ah_poll_generation; do
            if [ ! -e "$script" ]; then
              continue
            fi
            if ! grep -qE 'https://api\.apparelhub\.ai' "$script"; then
              echo "ERROR: $script does not pin https://api.apparelhub.ai" >&2
              exit 1
            fi
          done

      - name: Installer must not write APPARELHUB_API_KEY without --persist
        run: |
          set -euo pipefail
          # Heuristic: any printf-of-APPARELHUB_API_KEY-into-a-file must
          # appear after a PERSIST guard.
          if grep -qE 'printf.*APPARELHUB_API_KEY=' install.sh; then
            # Confirm there's a PERSIST guard before the printf call.
            persist_line=$(grep -nE '^[[:space:]]*if \[ \$PERSIST' install.sh | head -1 | cut -d: -f1)
            printf_line=$(grep -nE 'printf .*APPARELHUB_API_KEY=' install.sh | head -1 | cut -d: -f1)
            if [ -z "$persist_line" ] || [ "$persist_line" -gt "$printf_line" ]; then
              echo "ERROR: install.sh writes APPARELHUB_API_KEY without a --persist gate." >&2
              echo "       See SECURITY.md §2b." >&2
              exit 1
            fi
          fi

      - name: No real account-specific data (UUIDs or known real names)
        run: |
          set -euo pipefail
          # This is a PUBLIC repo: examples + docs must use generic placeholders,
          # never a real customer's account values. Exclude .git and .github
          # (this workflow itself names the forbidden tokens). See the repo's
          # operating rules: "never any REAL names, UUIDs, or account resources."
          # 1) No full UUIDs anywhere — use <printful_provider_uuid> / <workspace_uuid> / … instead.
          uuids=$(grep -rinoE '[0-9a-f]{8}-[0-9a-f]{4}-[0-9a-f]{4}-[0-9a-f]{4}-[0-9a-f]{12}' . \
              --exclude-dir=.git --exclude-dir=.github 2>/dev/null || true)
          # 2) No known real account names / connected-store hostnames.
          names=$(grep -rinE 'crystal riley|merctech|nyholm|cat lady|apparelhubai\.myshopify\.com|wp\.merctech\.io' . \
              --exclude-dir=.git --exclude-dir=.github 2>/dev/null || true)
          if [ -n "$uuids" ] || [ -n "$names" ]; then
            echo "ERROR: real account-specific data found in a public file." >&2
            echo "       Use generic placeholders: <printful_provider_uuid>, <workspace_uuid>, 'Acme Co', your-store.myshopify.com." >&2
            [ -n "$uuids" ] && { echo "--- UUIDs ---" >&2; echo "$uuids" >&2; }
            [ -n "$names" ] && { echo "--- names/hosts ---" >&2; echo "$names" >&2; }
            exit 1
          fi

      - name: No private-repo references (files)
        env:
          FORBIDDEN_REFS: ${{ secrets.FORBIDDEN_REFS }}
        run: |
          set -uo pipefail
          # Internal (non-public) repo names, internal ticket refs, internal
          # filesystem paths, and maintainer identifiers must never appear in a
          # public file. The pattern list is the FORBIDDEN_REFS repo secret
          # (never in this public file); quiet grep so a matched value is never
          # echoed into public logs. Refer to internal work generically
          # ("an internal platform ticket"). Excludes .git and .github.
          if [ -n "${FORBIDDEN_REFS:-}" ]; then
            if grep -rIlqE "$FORBIDDEN_REFS" . --exclude-dir=.git --exclude-dir=.github >/dev/null 2>&1; then
              echo "::error::A private-repo reference (internal repo name / ticket ref / internal path) is present in a tracked file. Replace it with a generic phrase like 'an internal platform ticket'. The pattern list is the FORBIDDEN_REFS repo secret — grep your tree against your own copy to find it."
              exit 1
            fi
          else
            echo "::warning::FORBIDDEN_REFS secret unavailable in this context (e.g. a fork PR); skipping."
          fi

      - name: Scan commit messages + PR text (private references)
        if: github.event_name == 'pull_request'
        env:
          FORBIDDEN_REFS: ${{ secrets.FORBIDDEN_REFS }}
          PR_TITLE: ${{ github.event.pull_request.title }}
          PR_BODY: ${{ github.event.pull_request.body }}
          BASE_SHA: ${{ github.event.pull_request.base.sha }}
          HEAD_SHA: ${{ github.event.pull_request.head.sha }}
        run: |
          set -uo pipefail
          # Commit messages, PR titles, and PR bodies are PUBLIC surfaces too.
          # PR text is read via env (never shell interpolation) so a malicious
          # title can't inject.
          fail=0
          PAT="${FORBIDDEN_REFS:-}"
          if [ -n "$PAT" ]; then
            MSGS=$(git log --format='%s%n%b' "$BASE_SHA".."$HEAD_SHA" 2>/dev/null || true)
            if printf '%s' "$MSGS" | grep -qE "$PAT"; then
              echo "::error::A private-repo reference appears in a COMMIT MESSAGE in this PR. Commit messages are public: reword (rebase) before merging."
              fail=1
            fi
            if printf '%s\n%s' "${PR_TITLE:-}" "${PR_BODY:-}" | grep -qE "$PAT"; then
              echo "::error::A private-repo reference appears in the PR title or body. Edit the PR text — it is a public surface."
              fail=1
            fi
          fi
          if [ "$fail" -ne 0 ]; then exit 1; fi
          echo "Commit messages + PR text: clean."

      - name: Smoke summary
        run: echo "All forbidden-pattern checks passed."
